# ═══════════════════════════════════════════════════════════
# AUTH SERVICE — Configuração Principal
# ═══════════════════════════════════════════════════════════
#
# Esse arquivo contém APENAS configurações que valem
# para TODOS os ambientes (dev, prod).
#
# Configurações específicas de ambiente ficam em:
# → application-dev.properties  (desenvolvimento local)
# → application-prod.properties (produção — não vai para o Git)
#
# O Spring Boot carrega automaticamente o arquivo do perfil ativo
# DEPOIS desse, sobrescrevendo ou complementando as propriedades.
# ═══════════════════════════════════════════════════════════

# Nome do serviço — usado pelo Eureka para identificar no dashboard
# e pelos outros microsserviços para fazer chamadas via LoadBalancer:
# RestTemplate/WebClient usa esse nome para resolver o endereço real
# Ex: http://auth-service/auth/login → Eureka resolve para localhost:8081
spring.application.name=auth-service

# Perfil ativo — determina qual application-{profile}.properties carregar
# dev  → application-dev.properties  (banco local, logs verbosos, Swagger ativo)
# prod → application-prod.properties (banco RDS, logs mínimos, Swagger desativo)
#
# Em produção esse valor é sobrescrito pela variável de ambiente:
# SPRING_PROFILES_ACTIVE=prod
# Nunca precisa mudar esse arquivo para fazer deploy
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}