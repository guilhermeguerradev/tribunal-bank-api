# ═══════════════════════════════════════════════════════════
# AUTH SERVICE — Configuração Principal
# Válido para todos os ambientes
# ═══════════════════════════════════════════════════════════

# Nome do serviço — usado pelo Eureka para identificar no dashboard
spring.application.name=auth-service

# Profile ativo — sobrescrito pelo .env em produção
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# ── Banco de dados ──────────────────────────────────────────
# Lê as variáveis do .env injetadas pelo spring-dotenv
# O valor após : é o padrão caso a variável não exista
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/auth_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA ────────────────────────────────────────────────────
# none → Flyway controla o schema, JPA nunca altera o banco
# NUNCA usar create ou create-drop em produção
spring.jpa.hibernate.ddl-auto=none

# Dialeto do PostgreSQL — diz ao Hibernate como gerar SQL
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ── Flyway ─────────────────────────────────────────────────
# Habilita o versionamento do banco
spring.flyway.enabled=true

# Pasta onde ficam os arquivos de migration
# V1__create_usuarios.sql, V2__create_refresh_tokens.sql...
spring.flyway.locations=classpath:db/migration

# ── JWT RSA ─────────────────────────────────────────────────
# Chaves lidas do .env — nunca hardcoded aqui
jwt.private-key=${JWT_PRIVATE_KEY}
jwt.public-key=${JWT_PUBLIC_KEY}

# Tempo de expiração em milissegundos
jwt.access-token-expiration=${JWT_ACCESS_TOKEN_EXPIRATION:900000}
jwt.refresh-token-expiration=${JWT_REFRESH_TOKEN_EXPIRATION:604800000}

# ── Eureka ──────────────────────────────────────────────────
# Endereço do Discovery Server
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka}

# Registra o auth-service no Eureka ao subir
eureka.client.register-with-eureka=true

# Busca a lista de serviços registrados no Eureka
eureka.client.fetch-registry=true

# ── Actuator ────────────────────────────────────────────────
# Expõe os endpoints de saúde para o Eureka e monitoramento
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always