# ═══════════════════════════════════════════════════════════
# AUTH SERVICE — Perfil de Desenvolvimento
# Ativo com: spring.profiles.active=dev
# ═══════════════════════════════════════════════════════════

server.port=8081

# ── Banco de dados ── valores fixos para dev local
spring.datasource.url=jdbc:postgresql://localhost:5433/auth_db
spring.datasource.username=postgres
spring.datasource.password=postgres

# ── JWT ── chaves fixas para dev local
jwt.private-key=-----BEGIN PRIVATE KEY-----\\n-----END PRIVATE KEY-----

jwt.public-key=-----BEGIN PUBLIC KEY-----\\n-----END PUBLIC KEY-----

jwt.access-token-expiration=900000
jwt.refresh-token-expiration=604800000

# ── Eureka ──
eureka.client.service-url.defaultZone=http://localhost:8761/eureka

# ── Logs ──
logging.level.com.tribunalbank=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# ── Swagger ──
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs

# Log temporário para debugar
logging.level.org.springframework.boot.autoconfigure.jdbc=DEBUG
logging.level.com.zaxxer.hikari=DEBUG