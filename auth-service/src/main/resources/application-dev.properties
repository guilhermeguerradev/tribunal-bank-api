# ═══════════════════════════════════════════════════════════
# AUTH SERVICE — Perfil de Desenvolvimento
# Ativo com: SPRING_PROFILES_ACTIVE=dev
# ═══════════════════════════════════════════════════════════

# Porta do serviço
server.port=8081

# ── JPA ────────────────────────────────────────────────────
# Mostra o SQL gerado pelo Hibernate no console
# Útil para entender o que está sendo executado no banco
spring.jpa.show-sql=true

# Formata o SQL para ficar legível no console
spring.jpa.properties.hibernate.format_sql=true

# ── Logs detalhados para desenvolvimento ────────────────────
logging.level.com.tribunalbank=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# ── Swagger ────────────────────────────────────────────────
# Habilita o Swagger UI em desenvolvimento
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs