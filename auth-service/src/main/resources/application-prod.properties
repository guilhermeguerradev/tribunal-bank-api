# ═══════════════════════════════════════════════════════════
# AUTH SERVICE — Perfil de Produção
# Ativo com: SPRING_PROFILES_ACTIVE=prod
# ═══════════════════════════════════════════════════════════

# Porta do serviço
server.port=8081

# ── JPA ────────────────────────────────────────────────────
# Nunca mostrar SQL em produção — expõe dados sensíveis nos logs
spring.jpa.show-sql=false

# ── Logs mínimos em produção ────────────────────────────────
# Só erros — evita poluição e exposição de dados nos logs
logging.level.com.tribunalbank=ERROR
logging.level.org.springframework.security=ERROR
logging.level.org.hibernate.SQL=ERROR

# ── Swagger ────────────────────────────────────────────────
# Desabilita o Swagger em produção por segurança
# Não queremos expor a documentação da API publicamente
springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false